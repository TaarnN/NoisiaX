scenario_id: "v3_event_emission"
schema_version: "1.0.0"
master_seed: 7
goal_statement: "Verify v3 typed_layer event emission preserves deterministic causal links."
assumptions:
  - assumption_id: "assume_v3_event_emission"
    category: "test"
    description: "Child events record parent event ids deterministically."
    rationale: "Exercise emit_events and causal_parent_event_ids output."
    confidence_level: REJECT

typed_layer:
  world:
    duration: 2.0
    time_unit: "ticks"
    max_event_count: 100

  component_types:
    - component_type_id: "Counter"
      fields:
        value: INTEGER

  entity_types:
    - entity_type_id: "node"
      components: ["Counter"]

  event_types:
    - event_type_id: "start"
      payload_fields: {}
    - event_type_id: "child"
      payload_fields:
        value: INTEGER

  entities:
    - entity_id: "n1"
      entity_type: "node"
      components:
        Counter:
          value: 0

  initial_events:
    - event_type: "start"
      timestamp: 0.0
      priority: 0
      event_handle: "start_0000"

  systems:
    - system_id: "emit_child"
      triggered_by: ["start"]
      kind: "per_entity"
      entity_type: "node"
      emit_events:
        - event_type: "child"
          timestamp: "event.timestamp + 1"
          priority: 0
          payload:
            value: "1"

