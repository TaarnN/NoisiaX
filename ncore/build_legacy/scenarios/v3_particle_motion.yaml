scenario_id: "v3_particle_motion"
schema_version: "1.0.0"
master_seed: 123
goal_statement: "Verify v3 typed_layer per-entity motion updates under deterministic tick scheduling."
assumptions:
  - assumption_id: "assume_v3_particle_motion"
    category: "test"
    description: "Particles update position deterministically each tick."
    rationale: "Exercise typed_layer component writes and event payload access."
    confidence_level: REJECT

typed_layer:
  world:
    duration: 10.0
    time_unit: "ticks"
    max_event_count: 1000
    tick_interval: 1.0

  component_types:
    - component_type_id: "Position"
      fields:
        x: FLOAT
        y: FLOAT
    - component_type_id: "Velocity"
      fields:
        vx: FLOAT
        vy: FLOAT

  entity_types:
    - entity_type_id: "particle"
      components: ["Position", "Velocity"]

  event_types:
    - event_type_id: "tick"
      payload_fields:
        dt: FLOAT

  entities:
    - entity_id: "p1"
      entity_type: "particle"
      components:
        Position:
          x: 0.0
          y: 0.0
        Velocity:
          vx: 1.0
          vy: 0.5
    - entity_id: "p2"
      entity_type: "particle"
      components:
        Position:
          x: 10.0
          y: -1.0
        Velocity:
          vx: -2.0
          vy: 0.0

  systems:
    - system_id: "move_particles"
      triggered_by: ["tick"]
      kind: "per_entity"
      entity_type: "particle"
      writes:
        - target: "Position.x"
          expr: "Position.x + Velocity.vx * event.dt"
        - target: "Position.y"
          expr: "Position.y + Velocity.vy * event.dt"

