  systems:
    - system_id: "daily_resident_pressure"
      triggered_by: ["tick"]
      kind: "per_entity"
      entity_type: "civic__resident"
      writes:
        - target: "civic__CivicState.safety"
          expr: "std::clamp(civic__CivicState.safety + 0.014 * civic__ResidentProfile.preparedness - 0.024 * civic__CivicState.stress - 0.010 * civic__CivicState.rumor_belief, 0, 1)"
        - target: "civic__CivicState.food"
          expr: "std::clamp(civic__CivicState.food - 0.018 * event.dt + 0.009 * civic__CivicState.volunteer_capacity, 0, 1)"
        - target: "civic__CivicState.water"
          expr: "std::clamp(civic__CivicState.water - 0.014 * event.dt + 0.004 * civic__ResidentProfile.preparedness, 0, 1)"
        - target: "civic__CivicState.stress"
          expr: "std::clamp(civic__CivicState.stress + 0.018 * (1 - civic__CivicState.power) + 0.014 * (1 - civic__CivicState.water) + 0.012 * civic__CivicState.rumor_belief - 0.010 * civic__CivicState.trust, 0, 1)"
        - target: "civic__CivicState.price_pressure"
          expr: "std::clamp(civic__CivicState.price_pressure * 0.985 + civic.resilience::triage_priority(civic__CivicState.stress, civic__ResidentProfile.care_load, civic__ResidentProfile.mobility, civic__ResidentProfile.preparedness, civic__CivicState.trust) * 0.018, 0, 25)"
        - target: "civic__CivicState.resilience_score"
          expr: "civic.resilience::resilience_index(civic__CivicState.safety, civic__CivicState.power, civic__CivicState.water, civic__CivicState.food, civic__CivicState.medical_access, civic__CivicState.trust, civic__CivicState.volunteer_capacity, civic__CivicState.stress, civic__CivicState.rumor_belief)"

    - system_id: "facility_daily_drift"
      triggered_by: ["tick"]
      kind: "per_entity"
      entity_type: "infra__facility"
      writes:
        - target: "infra__FacilityStatus.reliability"
          expr: "std::clamp(infra__FacilityStatus.reliability - 0.006 * infra__FacilityStatus.damage - 0.004 * infra__FacilityStatus.load / infra__FacilityStatus.capacity + 0.002 * infra__FacilityStatus.stock, 0, 1)"
        - target: "infra__FacilityStatus.backlog"
          expr: "std::clamp(infra__FacilityStatus.backlog + 0.018 * infra__FacilityStatus.damage + 0.010 * infra__FacilityStatus.load / infra__FacilityStatus.capacity - 0.006 * infra__FacilityStatus.stock, 0, 100)"
        - target: "infra__FacilityStatus.load"
          expr: "std::clamp(infra__FacilityStatus.load * 0.65, 0, infra__FacilityStatus.capacity * 2)"
        - target: "infra__FacilityStatus.price_index"
          expr: "std::clamp(infra__FacilityStatus.price_index * 0.92 + civic.resilience::scarcity_pressure(infra__FacilityStatus.stock, infra__FacilityStatus.load, infra__FacilityStatus.capacity, infra__FacilityStatus.damage, infra__FacilityStatus.reliability) + acme.market::bid_price_v2(infra__FacilityStatus.price_index) * 0.015, 0, 20)"

    - system_id: "service_delivery"
      triggered_by: ["tick"]
      kind: "per_relation"
      relation_type: "service_link"
      writes:
        - target: "self.infra__FacilityStatus.load"
          expr: "std::clamp(self.infra__FacilityStatus.load + relation.demand_weight * (1 + other.civic__CivicState.stress), 0, self.infra__FacilityStatus.capacity * 2)"
        - target: "other.civic__CivicState.power"
          expr: "std::clamp(other.civic__CivicState.power + 0.030 * self.infra__FacilityStatus.reliability - 0.050 * self.infra__FacilityStatus.damage - 0.010 * self.infra__FacilityStatus.load / self.infra__FacilityStatus.capacity, 0, 1)"
        - target: "other.civic__CivicState.water"
          expr: "std::clamp(other.civic__CivicState.water + 0.022 * self.infra__FacilityStatus.stock + 0.018 * self.infra__FacilityStatus.reliability - 0.012 * relation.distance_km, 0, 1)"
        - target: "other.civic__CivicState.medical_access"
          expr: "std::clamp(other.civic__CivicState.medical_access + 0.018 * relation.essentiality * self.infra__FacilityStatus.reliability - 0.020 * self.infra__FacilityStatus.backlog, 0, 1)"
        - target: "other.civic__CivicState.price_pressure"
          expr: "std::clamp(other.civic__CivicState.price_pressure + 0.080 * self.infra__FacilityStatus.price_index + 0.030 * civic.resilience::scarcity_pressure(self.infra__FacilityStatus.stock, self.infra__FacilityStatus.load, self.infra__FacilityStatus.capacity, self.infra__FacilityStatus.damage, self.infra__FacilityStatus.reliability), 0, 25)"

    - system_id: "social_signal_diffusion"
      triggered_by: ["tick"]
      kind: "per_relation"
      relation_type: "social_signal"
      where: "relation.tie_strength > 0.30"
      writes:
        - target: "other.civic__CivicState.rumor_belief"
          expr: "std::clamp(other.civic__CivicState.rumor_belief + relation.rumor_channel * (self.civic__CivicState.rumor_belief - other.civic__CivicState.trust) * 0.060, 0, 1)"
        - target: "other.civic__CivicState.trust"
          expr: "std::clamp(other.civic__CivicState.trust + relation.tie_strength * (self.civic__CivicState.trust - other.civic__CivicState.rumor_belief) * 0.035, 0, 1)"
        - target: "other.civic__CivicState.volunteer_capacity"
          expr: "std::clamp(other.civic__CivicState.volunteer_capacity + relation.tie_strength * self.civic__CivicState.volunteer_capacity * 0.010 - 0.005 * other.civic__CivicState.stress, 0, 1)"

    - system_id: "bootstrap_mutual_aid_after_storm"
      triggered_by: ["storm_front"]
      kind: "pair"
      entity_type: "civic__resident"
      where: "civic__ResidentProfile.district == other.civic__ResidentProfile.district && civic__CivicState.volunteer_capacity > 0.45 && other.civic__CivicState.stress > 0.32"
      create_relations:
        - relation_type: "volunteer_support"
          source: "self"
          target: "other"
          expires_after: "7 + rng(\"aid_days\", 0, 3)"
          when: "rng(\"aid_link\", 0, 1) < 0.055 + civic__CivicState.trust * 0.035"
          payload:
            aid: "std::clamp(civic__CivicState.volunteer_capacity * (0.7 + rng(\"aid_strength\", 0, 1) * 0.3), 0.05, 1)"
            created_day: "event.timestamp"
      emit_events:
        - event_type: "mutual_aid_alert"
          timestamp: "event.timestamp"
          priority: 1
          when: "rng(\"aid_alert\", 0, 1) < 0.08"
          payload:
            district: "civic__ResidentProfile.district"
            urgency: "event.severity"

    - system_id: "apply_mutual_aid"
      triggered_by: ["tick"]
      kind: "per_relation"
      relation_type: "volunteer_support"
      where: "relation.expires_at > event.timestamp"
      writes:
        - target: "other.civic__CivicState.food"
          expr: "std::clamp(other.civic__CivicState.food + relation.aid * 0.040, 0, 1)"
        - target: "other.civic__CivicState.water"
          expr: "std::clamp(other.civic__CivicState.water + relation.aid * 0.030, 0, 1)"
        - target: "other.civic__CivicState.stress"
          expr: "std::clamp(other.civic__CivicState.stress - relation.aid * 0.025, 0, 1)"
        - target: "self.civic__CivicState.volunteer_capacity"
          expr: "std::clamp(self.civic__CivicState.volunteer_capacity - relation.aid * 0.012, 0, 1)"

    - system_id: "storm_damages_facilities"
      triggered_by: ["storm_front"]
      kind: "per_entity"
      entity_type: "infra__facility"
      where: "infra__FacilityStatus.district == event.district"
      writes:
        - target: "infra__FacilityStatus.damage"
          expr: "std::clamp(infra__FacilityStatus.damage + event.severity * (0.18 + rng(\"facility_damage\", 0, 1) * 0.12), 0, 1)"
        - target: "infra__FacilityStatus.reliability"
          expr: "std::clamp(infra__FacilityStatus.reliability - event.severity * (0.12 + rng(\"facility_reliability\", 0, 1) * 0.08), 0, 1)"
        - target: "infra__FacilityStatus.backlog"
          expr: "std::clamp(infra__FacilityStatus.backlog + event.severity * 1.8, 0, 100)"
        - target: "infra__FacilityStatus.stock"
          expr: "std::clamp(infra__FacilityStatus.stock - event.severity * 0.20, 0, 1)"
      emit_events:
        - event_type: "service_slowdown"
          timestamp: "event.timestamp + 0.5"
          priority: 2
          when: "infra__FacilityStatus.reliability < 0.78 || rng(\"slowdown_emit\", 0, 1) < event.severity * 0.35"
          payload:
            district: "infra__FacilityStatus.district"
            severity: "std::clamp(event.severity + infra__FacilityStatus.damage, 0, 1)"

    - system_id: "storm_impacts_residents"
      triggered_by: ["storm_front"]
      kind: "per_entity"
      entity_type: "civic__resident"
      where: "civic__ResidentProfile.district == event.district"
      writes:
        - target: "civic__CivicState.safety"
          expr: "std::clamp(civic__CivicState.safety - event.severity * (0.16 + (1 - civic__ResidentProfile.preparedness) * 0.14), 0, 1)"
        - target: "civic__CivicState.stress"
          expr: "std::clamp(civic__CivicState.stress + event.severity * (0.18 + civic__ResidentProfile.care_load * 0.10), 0, 1)"
        - target: "civic__CivicState.power"
          expr: "std::clamp(civic__CivicState.power - event.severity * 0.22, 0, 1)"
        - target: "civic__CivicState.water"
          expr: "std::clamp(civic__CivicState.water - event.severity * 0.12, 0, 1)"
        - target: "civic__CivicState.rumor_belief"
          expr: "std::clamp(civic__CivicState.rumor_belief + event.severity * (0.08 + rng(\"storm_rumor\", 0, 1) * 0.06), 0, 1)"
      emit_events:
        - event_type: "mutual_aid_alert"
          timestamp: "event.timestamp + 0.25"
          priority: 1
          when: "civic__CivicState.stress > 0.62 && rng(\"resident_alert\", 0, 1) < 0.18"
          payload:
            district: "civic__ResidentProfile.district"
            urgency: "civic__CivicState.stress"

    - system_id: "service_slowdown_impact"
      triggered_by: ["service_slowdown"]
      kind: "per_relation"
      relation_type: "service_link"
      where: "self.infra__FacilityStatus.district == event.district"
      writes:
        - target: "other.civic__CivicState.power"
          expr: "std::clamp(other.civic__CivicState.power - event.severity * 0.14 * relation.demand_weight, 0, 1)"
        - target: "other.civic__CivicState.water"
          expr: "std::clamp(other.civic__CivicState.water - event.severity * 0.10 * relation.demand_weight, 0, 1)"
        - target: "other.civic__CivicState.medical_access"
          expr: "std::clamp(other.civic__CivicState.medical_access - event.severity * 0.08 * relation.essentiality, 0, 1)"
        - target: "other.civic__CivicState.stress"
          expr: "std::clamp(other.civic__CivicState.stress + event.severity * 0.08, 0, 1)"

    - system_id: "repair_wave_facilities"
      triggered_by: ["repair_wave"]
      kind: "per_entity"
      entity_type: "infra__facility"
      where: "infra__FacilityStatus.district == event.district"
      writes:
        - target: "infra__FacilityStatus.reliability"
          expr: "std::clamp(infra__FacilityStatus.reliability + event.crew_power * 0.22, 0, 1)"
        - target: "infra__FacilityStatus.damage"
          expr: "std::clamp(infra__FacilityStatus.damage - event.crew_power * 0.20, 0, 1)"
        - target: "infra__FacilityStatus.backlog"
          expr: "std::clamp(infra__FacilityStatus.backlog - event.crew_power * 1.4, 0, 100)"
        - target: "infra__FacilityStatus.stock"
          expr: "std::clamp(infra__FacilityStatus.stock + event.crew_power * 0.10, 0, 1)"

    - system_id: "supply_drop_residents"
      triggered_by: ["supply_drop"]
      kind: "per_entity"
      entity_type: "civic__resident"
      where: "civic__ResidentProfile.district == event.district"
      writes:
        - target: "civic__CivicState.food"
          expr: "std::clamp(civic__CivicState.food + event.stock_boost * (0.8 + civic__ResidentProfile.care_load * 0.2), 0, 1)"
        - target: "civic__CivicState.water"
          expr: "std::clamp(civic__CivicState.water + event.stock_boost * 0.35, 0, 1)"
        - target: "civic__CivicState.price_pressure"
          expr: "std::clamp(civic__CivicState.price_pressure - event.price_relief, 0, 25)"
        - target: "civic__CivicState.stress"
          expr: "std::clamp(civic__CivicState.stress - event.stock_boost * 0.09, 0, 1)"

    - system_id: "rumor_spike_residents"
      triggered_by: ["rumor_spike"]
      kind: "per_entity"
      entity_type: "civic__resident"
      where: "civic__ResidentProfile.district == event.district"
      writes:
        - target: "civic__CivicState.rumor_belief"
          expr: "std::clamp(civic__CivicState.rumor_belief + event.intensity * (0.16 + rng(\"rumor_accept\", 0, 1) * 0.12) - civic__CivicState.trust * 0.06, 0, 1)"
        - target: "civic__CivicState.trust"
          expr: "std::clamp(civic__CivicState.trust - event.intensity * 0.08 + civic__ResidentProfile.preparedness * 0.03, 0, 1)"
        - target: "civic__CivicState.stress"
          expr: "std::clamp(civic__CivicState.stress + event.intensity * civic__CivicState.rumor_belief * 0.10, 0, 1)"

    - system_id: "evacuation_residents"
      triggered_by: ["evacuation_order"]
      kind: "per_entity"
      entity_type: "civic__resident"
      where: "civic__ResidentProfile.district == event.district"
      writes:
        - target: "civic__CivicState.safety"
          expr: "std::clamp(civic__CivicState.safety + event.urgency * civic__ResidentProfile.mobility * 0.20 - civic__ResidentProfile.care_load * 0.04, 0, 1)"
        - target: "civic__CivicState.stress"
          expr: "std::clamp(civic__CivicState.stress + event.urgency * (1 - civic__ResidentProfile.mobility) * 0.14 - civic__CivicState.trust * 0.04, 0, 1)"
        - target: "civic__CivicState.food"
          expr: "std::clamp(civic__CivicState.food - event.urgency * 0.05, 0, 1)"

    - system_id: "coordination_policy_updates"
      triggered_by: ["coordination_day"]
      kind: "per_entity"
      entity_type: "gov__command_cell"
      writes:
        - target: "gov__CommandState.coordination"
          expr: "std::clamp(gov__CommandState.coordination + event.public_confidence * 0.04 + rng(\"coordination_gain\", 0, 1) * 0.02, 0, 1)"
        - target: "gov__CommandState.public_messaging"
          expr: "std::clamp(gov__CommandState.public_messaging + event.public_confidence * 0.03, 0, 1)"
        - target: "gov__CommandState.legitimacy"
          expr: "std::clamp(gov__CommandState.legitimacy + event.public_confidence * 0.025 - 0.006 * event.repair_focus, 0, 1)"
        - target: "gov__CommandState.budget"
          expr: "std::clamp(gov__CommandState.budget - event.repair_focus * 11.0, 0, 5000)"

    - system_id: "resident_policy_effects"
      triggered_by: ["coordination_day"]
      kind: "per_relation"
      relation_type: "resident_policy_link"
      writes:
        - target: "other.civic__ResidentProfile.preparedness"
          expr: "std::clamp(other.civic__ResidentProfile.preparedness + relation.coverage * self.gov__CommandState.public_messaging * 0.018, 0, 1)"
        - target: "other.civic__CivicState.trust"
          expr: "std::clamp(other.civic__CivicState.trust + relation.coverage * self.gov__CommandState.legitimacy * 0.020, 0, 1)"
        - target: "other.civic__CivicState.stress"
          expr: "std::clamp(other.civic__CivicState.stress - relation.coverage * self.gov__CommandState.coordination * 0.012, 0, 1)"
        - target: "self.gov__CommandState.budget"
          expr: "std::clamp(self.gov__CommandState.budget - relation.coverage * 0.65, 0, 5000)"

    - system_id: "facility_policy_effects"
      triggered_by: ["repair_wave"]
      kind: "per_relation"
      relation_type: "facility_policy_link"
      where: "other.infra__FacilityStatus.district == event.district"
      writes:
        - target: "other.infra__FacilityStatus.reliability"
          expr: "std::clamp(other.infra__FacilityStatus.reliability + relation.priority * self.gov__CommandState.coordination * event.crew_power * 0.08, 0, 1)"
        - target: "other.infra__FacilityStatus.backlog"
          expr: "std::clamp(other.infra__FacilityStatus.backlog - relation.priority * self.gov__CommandState.field_teams * 0.20, 0, 100)"
        - target: "self.gov__CommandState.budget"
          expr: "std::clamp(self.gov__CommandState.budget - relation.priority * event.crew_power * 2.8, 0, 5000)"

    - system_id: "mutual_aid_alert_resident_response"
      triggered_by: ["mutual_aid_alert"]
      kind: "per_entity"
      entity_type: "civic__resident"
      where: "civic__ResidentProfile.district == event.district"
      writes:
        - target: "civic__CivicState.volunteer_capacity"
          expr: "std::clamp(civic__CivicState.volunteer_capacity + event.urgency * civic__CivicState.trust * 0.030 - civic__CivicState.stress * 0.010, 0, 1)"
        - target: "civic__CivicState.trust"
          expr: "std::clamp(civic__CivicState.trust + event.urgency * 0.010, 0, 1)"
        - target: "civic__CivicState.stress"
          expr: "std::clamp(civic__CivicState.stress - event.urgency * civic__CivicState.volunteer_capacity * 0.018, 0, 1)"
