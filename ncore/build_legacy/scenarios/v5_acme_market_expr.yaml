scenario_id: "v5_acme_market_expr"
schema_version: "5.0.0"
master_seed: 1
goal_statement: "v5 extension fixture: call an extension expression function from a typed system."
assumptions:
  - assumption_id: "assume_v5_acme_market_expr"
    category: "test"
    description: "Sample.value depends only on acme.market::bid_price_v2 and std::clamp."
    rationale: "Used to test v5 symbol resolution for extension expression functions."
    confidence_level: REJECT

extensions:
  - id: "acme.market"
    version: "1.2.0"
    compatibility: ">=1.2,<2.0"

typed_layer:
  world:
    duration: 1.0
    time_unit: "ticks"
    max_event_count: 10

  component_types:
    - component_type_id: "Sample"
      fields:
        value: FLOAT

  entity_types:
    - entity_type_id: "node"
      components: ["Sample"]

  event_types:
    - event_type_id: "start"
      payload_fields: {}

  entities:
    - entity_id: "n1"
      entity_type: "node"
      components:
        Sample:
          value: 0.0

  initial_events:
    - event_type: "start"
      timestamp: 0.0
      priority: 0
      event_handle: "start_0000"

  systems:
    - system_id: "acme_expr_demo"
      triggered_by: ["start"]
      kind: "per_entity"
      entity_type: "node"
      writes:
        - target: "Sample.value"
          expr: "std::clamp(acme.market::bid_price_v2(10), 0, 100)"

