scenario_id: "v2_queue_capacity"
schema_version: "2.0.0"
master_seed: 404

goal_statement: |
  Exercise v2 queue pressure by sending multiple agents to a slow, capacity-one
  shop so retry decisions and queue penalties can appear in traces.

assumptions:
  - assumption_id: "v2_queue_assume_001"
    category: "fixture"
    description: "A slow single-capacity service point can create deterministic queue pressure."
    rationale: "Queue effects are part of the v2 decision model and need an isolated fixture."
    confidence_level: REJECT

entities:
  - entity_id: "v2_queue_entity"
    entity_type: "fixture_anchor"
    description: "Compatibility anchor for v1 validation gates."
    attributes:
      fixture: "v2_queue_capacity"

variables:
  - variable_id: "v2_queue_anchor"
    entity_ref: "v2_queue_entity"
    type: FLOAT
    default_value: 1.0
    min_value: 0
    description: "Compatibility anchor variable."
  - variable_id: "v2_queue_guard"
    entity_ref: "v2_queue_entity"
    type: FLOAT
    default_value: 1.0
    min_value: 0
    description: "Compatibility guard variable."

dependency_edges:
  - edge_id: "v2_queue_anchor_guard"
    source_variable: "v2_queue_anchor"
    target_variable: "v2_queue_guard"
    propagation_function_id: "linear_scale"
    weight: 1.0

constraints:
  - constraint_id: "v2_queue_guard_non_negative"
    affected_variables: ["v2_queue_guard"]
    constraint_expression: "v2_queue_guard >= 0"
    enforcement_level: REJECT
    error_message: "v2_queue_guard must remain non-negative."

events: []

evaluation_criteria:
  - criterion_id: "v2_queue_eval"
    metric_name: "compatibility_guard"
    aggregation_method: FINAL
    input_variables: ["v2_queue_guard"]
    threshold_min: 0
    description: "Compatibility check for the v1 validation path."

agent_layer:
  world:
    duration: 7.0
    time_unit: "minutes"
    map_width: 15.0
    map_height: 15.0
    default_walking_speed: 1.0
    max_event_count: 300

  locations:
    - location_id: "entry"
      location_type: "start"
      x: 0.0
      y: 0.0
    - location_id: "slow_counter"
      location_type: "shop"
      x: 0.5
      y: 0.0

  items:
    - item_id: "slow_service_meal"
      category: "food"
      tags: ["food", "meal"]
      base_appeal: 1.6

  shops:
    - shop_id: "slow_stall"
      location_ref: "slow_counter"
      service_time: 2.5
      queue_capacity: 1
      inventory:
        - item_id: "slow_service_meal"
          price: 1.0
          stock: 5

  agents:
    - agent_id: "queue_agent_a"
      start_location_ref: "entry"
      budget: 2.0
      movement_speed: 1.0
      hunger: 1.0
      social_susceptibility: 0.0
      memory_slots: 2
      policy_ref: "queue_policy"
      traits:
        patience: 0.8
      preferences:
        slow_service_meal: 1.4
    - agent_id: "queue_agent_b"
      start_location_ref: "entry"
      budget: 2.0
      movement_speed: 1.0
      hunger: 1.0
      social_susceptibility: 0.0
      memory_slots: 2
      policy_ref: "queue_policy"
      traits:
        patience: 0.6
      preferences:
        slow_service_meal: 1.4
    - agent_id: "queue_agent_c"
      start_location_ref: "entry"
      budget: 2.0
      movement_speed: 1.0
      hunger: 1.0
      social_susceptibility: 0.0
      memory_slots: 2
      policy_ref: "queue_policy"
      traits:
        patience: 0.4
      preferences:
        slow_service_meal: 1.4

  policies:
    - policy_id: "queue_policy"
      movement_policy: "nearest_available"
      observation_policy: "none"
      conversation_policy: "none"
      purchase_policy: "weighted_rule_v2"
