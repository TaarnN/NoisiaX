scenario_id: "v3_relation_decay"
schema_version: "1.0.0"
master_seed: 9
goal_statement: "Verify v3 typed_layer relation expiration is deterministic."
assumptions:
  - assumption_id: "assume_v3_relation_decay"
    category: "test"
    description: "Relations expire when expires_at <= current event time."
    rationale: "Exercise expires_at handling and final relation snapshot."
    confidence_level: REJECT

typed_layer:
  world:
    duration: 1.0
    time_unit: "ticks"
    max_event_count: 10

  component_types:
    - component_type_id: "Dummy"
      fields:
        value: INTEGER

  entity_types:
    - entity_type_id: "node"
      components: ["Dummy"]

  relation_types:
    - relation_type_id: "link"
      directed: false
      payload_fields: {}

  event_types:
    - event_type_id: "check"
      payload_fields: {}

  entities:
    - entity_id: "a"
      entity_type: "node"
      components:
        Dummy:
          value: 1
    - entity_id: "b"
      entity_type: "node"
      components:
        Dummy:
          value: 2

  relations:
    - relation_type: "link"
      source: "a"
      target: "b"
      expires_at: 0.5

  initial_events:
    - event_type: "check"
      timestamp: 1.0
      priority: 0
      event_handle: "check_0000"

