scenario_id: "v3_max_events_limit"
schema_version: "1.0.0"
master_seed: 5
goal_statement: "Verify v3 typed_layer halts cleanly when max_event_count is exceeded."
assumptions:
  - assumption_id: "assume_v3_max_events_limit"
    category: "test"
    description: "This fixture must halt due to max_events."
    rationale: "Exercise runtime safety limits for event processing."
    confidence_level: REJECT

typed_layer:
  world:
    duration: 10.0
    time_unit: "ticks"
    max_event_count: 2
    tick_interval: 1.0

  component_types:
    - component_type_id: "Dummy"
      fields:
        value: INTEGER

  entity_types:
    - entity_type_id: "node"
      components: ["Dummy"]

  event_types:
    - event_type_id: "tick"
      payload_fields:
        dt: FLOAT

  entities:
    - entity_id: "n1"
      entity_type: "node"
      components:
        Dummy:
          value: 1

