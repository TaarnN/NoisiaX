scenario_id: "v3_invalid_write_undeclared_field"
schema_version: "1.0.0"
master_seed: 1
goal_statement: "Invalid: system writes to undeclared component field."
assumptions:
  - assumption_id: "assume_invalid_write_undeclared_field"
    category: "test"
    description: "This fixture should fail validation."
    rationale: "System write target points to a missing field."
    confidence_level: REJECT

typed_layer:
  world:
    duration: 1.0
    time_unit: "ticks"
    max_event_count: 10

  component_types:
    - component_type_id: "Position"
      fields:
        x: FLOAT

  entity_types:
    - entity_type_id: "node"
      components: ["Position"]

  event_types:
    - event_type_id: "start"
      payload_fields: {}

  entities:
    - entity_id: "e1"
      entity_type: "node"
      components:
        Position:
          x: 0.0

  initial_events:
    - event_type: "start"
      timestamp: 0.0
      priority: 0
      event_handle: "start_0000"

  systems:
    - system_id: "bad_write"
      triggered_by: ["start"]
      kind: "per_entity"
      entity_type: "node"
      writes:
        - target: "Position.y"
          expr: "1"

