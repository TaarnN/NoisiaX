scenario_id: "v3_invalid_both_layers"
schema_version: "1.0.0"
master_seed: 1
goal_statement: "Invalid: scenario includes both agent_layer and typed_layer."
assumptions:
  - assumption_id: "assume_invalid_both_layers"
    category: "test"
    description: "This fixture should fail validation."
    rationale: "typed_layer and agent_layer are mutually exclusive."
    confidence_level: REJECT

agent_layer:
  world:
    duration: 1.0
    time_unit: "minutes"
    map_width: 10.0
    map_height: 10.0
    default_walking_speed: 1.0
    max_event_count: 10
  locations:
    - location_id: "loc"
      location_type: "start"
      x: 0.0
      y: 0.0
  items:
    - item_id: "item"
      category: "fixture"
      tags: []
      base_appeal: 1.0
  shops:
    - shop_id: "shop"
      location_ref: "loc"
      service_time: 1.0
      queue_capacity: 1
      inventory:
        - item_id: "item"
          price: 1.0
          stock: 1
  agents:
    - agent_id: "agent"
      start_location_ref: "loc"
      budget: 2.0
      movement_speed: 1.0
      hunger: 0.0
      social_susceptibility: 0.0
      memory_slots: 1
      policy_ref: "default"
      traits: {}
      preferences: {}
  policies:
    - policy_id: "default"

typed_layer:
  world:
    duration: 1.0
    time_unit: "ticks"
    max_event_count: 10
  component_types:
    - component_type_id: "Dummy"
      fields:
        x: FLOAT
  entity_types:
    - entity_type_id: "node"
      components: ["Dummy"]
  event_types:
    - event_type_id: "start"
      payload_fields: {}
  entities:
    - entity_id: "e1"
      entity_type: "node"
      components:
        Dummy:
          x: 0.0
