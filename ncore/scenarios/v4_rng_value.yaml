scenario_id: "v4_rng_value"
schema_version: "1.0.0"
master_seed: 1
goal_statement: "v4 experiment fixture: store a deterministic RNG draw into a typed field."
assumptions:
  - assumption_id: "assume_v4_rng_value"
    category: "test"
    description: "Sample.value depends only on the deterministic rng(stream_key,min,max) call and the run seed."
    rationale: "Used to test experiment determinism, overlays, and metric aggregation."
    confidence_level: REJECT

typed_layer:
  world:
    duration: 1.0
    time_unit: "ticks"
    max_event_count: 10

  component_types:
    - component_type_id: "Sample"
      fields:
        value: FLOAT

  entity_types:
    - entity_type_id: "node"
      components: ["Sample"]

  event_types:
    - event_type_id: "start"
      payload_fields: {}

  entities:
    - entity_id: "n1"
      entity_type: "node"
      components:
        Sample:
          value: 0.0

  initial_events:
    - event_type: "start"
      timestamp: 0.0
      priority: 0
      event_handle: "start_0000"

  systems:
    - system_id: "draw_sample"
      triggered_by: ["start"]
      kind: "per_entity"
      entity_type: "node"
      writes:
        - target: "Sample.value"
          expr: "rng(\"sample\", 0, 1)"

