scenario_id: "v3_invalid_field_type_mismatch"
schema_version: "1.0.0"
master_seed: 1
goal_statement: "Invalid: entity assigns wrong field type."
assumptions:
  - assumption_id: "assume_invalid_field_type_mismatch"
    category: "test"
    description: "This fixture should fail validation."
    rationale: "Component field expects INTEGER but receives STRING."
    confidence_level: REJECT

typed_layer:
  world:
    duration: 1.0
    time_unit: "ticks"
    max_event_count: 10

  component_types:
    - component_type_id: "Count"
      fields:
        value: INTEGER

  entity_types:
    - entity_type_id: "node"
      components: ["Count"]

  event_types:
    - event_type_id: "start"
      payload_fields: {}

  entities:
    - entity_id: "e1"
      entity_type: "node"
      components:
        Count:
          value: "not_an_int"

