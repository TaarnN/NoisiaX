scenario_id: "v3_relation_bound_violation"
schema_version: "1.0.0"
master_seed: 10
goal_statement: "Verify v3 typed_layer rejects relation creation beyond configured bounds at runtime."
assumptions:
  - assumption_id: "assume_v3_relation_bound_violation"
    category: "test"
    description: "This fixture must halt due to relation max_total bound."
    rationale: "Exercise runtime relation bounds enforcement."
    confidence_level: REJECT

typed_layer:
  world:
    duration: 1.0
    time_unit: "ticks"
    max_event_count: 100

  component_types:
    - component_type_id: "Position"
      fields:
        x: FLOAT
        y: FLOAT

  entity_types:
    - entity_type_id: "atom"
      components: ["Position"]

  relation_types:
    - relation_type_id: "bond"
      directed: false
      max_total: 1
      payload_fields: {}

  event_types:
    - event_type_id: "start"
      payload_fields: {}

  entities:
    - entity_id: "a1"
      entity_type: "atom"
      components:
        Position:
          x: 0.0
          y: 0.0
    - entity_id: "a2"
      entity_type: "atom"
      components:
        Position:
          x: 0.5
          y: 0.0
    - entity_id: "a3"
      entity_type: "atom"
      components:
        Position:
          x: 0.6
          y: 0.0

  initial_events:
    - event_type: "start"
      timestamp: 0.0
      priority: 0
      event_handle: "start_0000"

  systems:
    - system_id: "bond_close_atoms"
      triggered_by: ["start"]
      kind: "pair"
      entity_type: "atom"
      where: "sqrt((Position.x - other.Position.x) * (Position.x - other.Position.x) + (Position.y - other.Position.y) * (Position.y - other.Position.y)) < 1.0"
      create_relations:
        - relation_type: "bond"
          source: "self"
          target: "other"

