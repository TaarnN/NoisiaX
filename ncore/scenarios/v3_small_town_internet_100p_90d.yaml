scenario_id: "v3_small_town_internet_100p_90d"
schema_version: "1.0.0"
master_seed: 20260505
goal_statement: "Simulate internet adoption, infrastructure stress, misinformation, repair, education, and local economic effects across a 100-person small town over 90 days."
assumptions:
  - assumption_id: "assume_small_town_scale"
    category: "simulation_scope"
    description: "The town has 100 residents grouped into 25 households and 5 wards served by ward-level network hubs."
    rationale: "This creates enough heterogeneity for chain reactions while remaining inspectable as a deterministic typed-layer fixture."
    confidence_level: REJECT
  - assumption_id: "assume_chain_reactions"
    category: "runtime_behavior"
    description: "Connectivity, trust, adoption, misinformation, service slowdowns, help tickets, and repairs can reinforce or dampen each other over time."
    rationale: "The scenario is designed to exercise event chains, relations, event emission, bounded random draws, and final-state snapshots."
    confidence_level: REJECT

typed_layer:
  world:
    duration: 90.0
    time_unit: "days"
    max_event_count: 5000
    tick_interval: 1.0

  component_types:
    - component_type_id: "PersonProfile"
      fields:
        household: INTEGER
        ward: INTEGER
        age: INTEGER
        role: STRING
        income: FLOAT
        digital_skill: FLOAT
    - component_type_id: "AccessState"
      fields:
        has_internet: BOOLEAN
        device_quality: FLOAT
        router_health: FLOAT
        plan_speed: FLOAT
        monthly_cost: FLOAT
    - component_type_id: "InternetBehavior"
      fields:
        usage_hours: FLOAT
        remote_work_hours: FLOAT
        learning_hours: FLOAT
        misinformation_exposure: FLOAT
        trusted_info: FLOAT
        social_posts: FLOAT
    - component_type_id: "Wellbeing"
      fields:
        productivity: FLOAT
        school_progress: FLOAT
        health_access: FLOAT
        happiness: FLOAT
        savings: FLOAT
    - component_type_id: "Adoption"
      fields:
        interest: FLOAT
        subscribed: BOOLEAN
        days_online: INTEGER
        churn_risk: FLOAT
    - component_type_id: "EventMemory"
      fields:
        service_disruption: FLOAT
        rumor_belief: FLOAT
        help_requests: INTEGER
    - component_type_id: "NetworkNode"
      fields:
        ward: INTEGER
        capacity: FLOAT
        load: FLOAT
        reliability: FLOAT
        repair_backlog: FLOAT
        outage_pressure: FLOAT

  entity_types:
    - entity_type_id: "resident"
      components:
        [
          "PersonProfile",
          "AccessState",
          "InternetBehavior",
          "Wellbeing",
          "Adoption",
          "EventMemory",
        ]
    - entity_type_id: "network_hub"
      components: ["NetworkNode"]

  relation_types:
    - relation_type_id: "served_by"
      directed: true
      max_total: 120
      payload_fields:
        distance_km: FLOAT
        demand_weight: FLOAT
    - relation_type_id: "friendship"
      directed: true
      max_per_entity: 12
      max_total: 280
      payload_fields:
        tie_strength: FLOAT
        channel: STRING
    - relation_type_id: "help_ticket"
      directed: true
      max_total: 2000
      payload_fields:
        severity: FLOAT
        created_day: FLOAT

  event_types:
    - event_type_id: "tick"
      payload_fields:
        dt: FLOAT
    - event_type_id: "fiber_cut"
      payload_fields:
        ward: INTEGER
        severity: FLOAT
    - event_type_id: "repair_drive"
      payload_fields:
        ward: INTEGER
        boost: FLOAT
    - event_type_id: "training_day"
      payload_fields:
        skill_boost: FLOAT
        trust_boost: FLOAT
    - event_type_id: "subsidy_offer"
      payload_fields:
        income_ceiling: FLOAT
        cost_discount: FLOAT
        interest_boost: FLOAT
    - event_type_id: "school_device_rollout"
      payload_fields:
        device_boost: FLOAT
        trust_boost: FLOAT
    - event_type_id: "rumor_wave"
      payload_fields:
        intensity: FLOAT
    - event_type_id: "festival_stream"
      payload_fields:
        demand_boost: FLOAT
        post_boost: FLOAT
    - event_type_id: "service_slowdown"
      payload_fields:
        ward: INTEGER
        severity: FLOAT

  entities:
    - entity_id: "hub_ward_1"
      entity_type: "network_hub"
      components:
        NetworkNode:
          ward: 1
          capacity: 520.0
          load: 0.0
          reliability: 0.910
          repair_backlog: 0.750
          outage_pressure: 0.055
    - entity_id: "hub_ward_2"
