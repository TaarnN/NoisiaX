  systems:
    - system_id: "tick_memory_decay_residents"
      triggered_by: ["tick"]
      kind: "per_entity"
      entity_type: "resident"
      writes:
        - target: "EventMemory.rumor_belief"
          expr: "clamp(EventMemory.rumor_belief * 0.985 - InternetBehavior.trusted_info * 0.003, 0, 1)"
        - target: "EventMemory.service_disruption"
          expr: "clamp(EventMemory.service_disruption * 0.93, 0, 90)"
        - target: "InternetBehavior.misinformation_exposure"
          expr: 'clamp(InternetBehavior.misinformation_exposure * 0.96 + AccessState.has_internet * rng("ambient_misinfo", 0, 0.010), 0, 1)'
        - target: "InternetBehavior.trusted_info"
          expr: "clamp(InternetBehavior.trusted_info * 0.998, 0, 1)"
        - target: "Adoption.churn_risk"
          expr: "clamp(Adoption.churn_risk * 0.96 + EventMemory.service_disruption * 0.002 + EventMemory.rumor_belief * 0.003, 0, 1)"

    - system_id: "daily_adoption_residents"
      triggered_by: ["tick"]
      kind: "per_entity"
      entity_type: "resident"
      writes:
        - target: "Adoption.interest"
          expr: 'clamp(Adoption.interest + 0.006 + PersonProfile.digital_skill * 0.004 + InternetBehavior.trusted_info * 0.003 + AccessState.device_quality * 0.002 - EventMemory.rumor_belief * 0.006 - AccessState.monthly_cost * 0.00035 + rng("adoption_daily", 0, 0.012), 0, 1)'
        - target: "Adoption.subscribed"
          expr: "Adoption.subscribed || Adoption.interest > (0.62 + EventMemory.rumor_belief * 0.18 + AccessState.monthly_cost * 0.002)"
        - target: "AccessState.has_internet"
          expr: "Adoption.subscribed"
        - target: "Adoption.days_online"
          expr: "Adoption.days_online + AccessState.has_internet"

    - system_id: "daily_usage_and_wellbeing_residents"
      triggered_by: ["tick"]
      kind: "per_entity"
      entity_type: "resident"
      writes:
        - target: "InternetBehavior.usage_hours"
          expr: 'clamp(AccessState.has_internet * (0.4 + PersonProfile.digital_skill * 2.4 + Adoption.interest * 1.1 + AccessState.device_quality * 1.0 + rng("daily_usage", 0, 1.4)) * AccessState.router_health, 0, 9)'
        - target: "InternetBehavior.remote_work_hours"
          expr: 'clamp(AccessState.has_internet * AccessState.router_health * ((PersonProfile.role == "remote_worker") * 5.0 + (PersonProfile.role == "teacher") * 1.8 + (PersonProfile.role == "vendor") * 1.2 + (PersonProfile.role == "worker") * 1.0 + (PersonProfile.role == "farmer") * 0.5), 0, 8)'
        - target: "InternetBehavior.learning_hours"
          expr: 'clamp(AccessState.has_internet * ((PersonProfile.role == "student") * 3.2 + (PersonProfile.role == "teacher") * 1.0 + PersonProfile.digital_skill * 0.3), 0, 5)'
        - target: "InternetBehavior.social_posts"
          expr: 'clamp(AccessState.has_internet * (InternetBehavior.social_posts * 0.25 + PersonProfile.digital_skill * 1.1 + rng("daily_posts", 0, 2.5)), 0, 12)'
        - target: "Wellbeing.productivity"
          expr: "clamp(Wellbeing.productivity + InternetBehavior.remote_work_hours * 0.004 + AccessState.plan_speed * 0.0004 - EventMemory.service_disruption * 0.004 - Adoption.churn_risk * 0.002, 0, 1)"
        - target: "Wellbeing.school_progress"
          expr: 'clamp(Wellbeing.school_progress + InternetBehavior.learning_hours * 0.006 + (PersonProfile.role == "student") * InternetBehavior.trusted_info * 0.003, 0, 1)'
        - target: "Wellbeing.health_access"
          expr: 'clamp(Wellbeing.health_access + AccessState.has_internet * ((PersonProfile.role == "elder") * 0.006 + InternetBehavior.trusted_info * 0.002) - EventMemory.service_disruption * 0.002, 0, 1)'
        - target: "Wellbeing.happiness"
          expr: "clamp(Wellbeing.happiness + AccessState.has_internet * 0.002 + InternetBehavior.usage_hours * 0.0005 - InternetBehavior.misinformation_exposure * 0.003 - EventMemory.service_disruption * 0.004 - AccessState.monthly_cost * 0.0002, 0, 1)"
        - target: "Wellbeing.savings"
          expr: 'clamp(Wellbeing.savings + Wellbeing.productivity * 0.8 + AccessState.has_internet * ((PersonProfile.role == "vendor") * PersonProfile.income * 0.004 + (PersonProfile.role == "remote_worker") * PersonProfile.income * 0.003 + (PersonProfile.role == "farmer") * PersonProfile.income * 0.001) - AccessState.monthly_cost / 30, -500, 10000)'

    - system_id: "reset_network_load"
      triggered_by: ["tick"]
      kind: "per_entity"
      entity_type: "network_hub"
      writes:
        - target: "NetworkNode.load"
          expr: "0"
        - target: "NetworkNode.outage_pressure"
          expr: "clamp(NetworkNode.outage_pressure * 0.94 + NetworkNode.repair_backlog * 0.020, 0, 1)"

    - system_id: "served_relation_network_effects"
      triggered_by: ["tick"]
      kind: "per_relation"
      relation_type: "served_by"
      writes:
        - target: "self.NetworkNode.load"
          expr: "NetworkNode.load + other.InternetBehavior.usage_hours * relation.demand_weight * (1.0 + other.AccessState.has_internet * 0.15)"
        - target: "other.AccessState.plan_speed"
          expr: "clamp((NetworkNode.capacity / (1 + NetworkNode.load)) * NetworkNode.reliability * 2.8 - relation.distance_km * 0.45, 1, 100)"
        - target: "other.AccessState.router_health"
          expr: "clamp(other.AccessState.router_health + NetworkNode.reliability * 0.002 - NetworkNode.outage_pressure * 0.012 - relation.distance_km * 0.001, 0.25, 1)"
        - target: "other.EventMemory.service_disruption"
          expr: "clamp(other.EventMemory.service_disruption + (NetworkNode.reliability < 0.55) * 0.6 + (NetworkNode.load > NetworkNode.capacity) * 0.4, 0, 90)"

    - system_id: "daily_social_influence"
      triggered_by: ["tick"]
      kind: "per_relation"
      relation_type: "friendship"
      writes:
        - target: "other.Adoption.interest"
          expr: "clamp(other.Adoption.interest + AccessState.has_internet * relation.tie_strength * 0.003 + InternetBehavior.trusted_info * relation.tie_strength * 0.0015 - EventMemory.rumor_belief * relation.tie_strength * 0.002, 0, 1)"
        - target: "other.InternetBehavior.misinformation_exposure"
          expr: "clamp(other.InternetBehavior.misinformation_exposure + InternetBehavior.misinformation_exposure * relation.tie_strength * 0.002, 0, 1)"
        - target: "other.InternetBehavior.trusted_info"
          expr: "clamp(other.InternetBehavior.trusted_info + InternetBehavior.trusted_info * relation.tie_strength * 0.001, 0, 1)"

    - system_id: "network_stress_and_slowdown_emission"
      triggered_by: ["tick"]
      kind: "per_entity"
      entity_type: "network_hub"
      writes:
        - target: "NetworkNode.reliability"
          expr: 'clamp(NetworkNode.reliability + 0.012 + rng("maintenance", 0, 0.012) - (NetworkNode.load / NetworkNode.capacity) * 0.080 - NetworkNode.repair_backlog * 0.006, 0.18, 0.99)'
        - target: "NetworkNode.repair_backlog"
          expr: "clamp(NetworkNode.repair_backlog + (NetworkNode.load / NetworkNode.capacity > 0.95) * 0.8 + (NetworkNode.reliability < 0.5) * 0.6 - 0.18, 0, 80)"
      emit_events:
        - event_type: "service_slowdown"
          timestamp: "event.timestamp + 0.05"
          priority: 0
          when: "NetworkNode.load / NetworkNode.capacity > 0.90 || NetworkNode.reliability < 0.52"
          payload:
            ward: "NetworkNode.ward"
            severity: "clamp(NetworkNode.load / NetworkNode.capacity - 0.85 + (0.55 - NetworkNode.reliability), 0.05, 1.0)"

    - system_id: "service_slowdown_hits_residents"
      triggered_by: ["service_slowdown"]
      kind: "per_relation"
      relation_type: "served_by"
      where: "NetworkNode.ward == event.ward"
      writes:
        - target: "other.EventMemory.service_disruption"
          expr: "clamp(other.EventMemory.service_disruption + event.severity, 0, 90)"
        - target: "other.Adoption.churn_risk"
          expr: "clamp(other.Adoption.churn_risk + event.severity * (0.03 + other.EventMemory.rumor_belief * 0.02), 0, 1)"
        - target: "other.Wellbeing.happiness"
          expr: "clamp(other.Wellbeing.happiness - event.severity * 0.030, 0, 1)"
        - target: "other.EventMemory.help_requests"
          when: 'other.Adoption.churn_risk > 0.30 && rng("ticket_write", 0, 1) > 0.88'
          expr: "other.EventMemory.help_requests + 1"
      create_relations:
        - relation_type: "help_ticket"
          source: "other"
          target: "self"
          expires_after: "14"
          when: 'other.Adoption.churn_risk > 0.30 && rng("ticket_relation", 0, 1) > 0.88'
          payload:
            severity: "event.severity"
            created_day: "event.timestamp"

    - system_id: "process_help_tickets"
      triggered_by: ["tick"]
      kind: "per_relation"
      relation_type: "help_ticket"
      writes:
        - target: "other.NetworkNode.repair_backlog"
          expr: "max(0, other.NetworkNode.repair_backlog - relation.severity * 0.030)"
        - target: "self.Wellbeing.happiness"
          expr: "clamp(Wellbeing.happiness + 0.001, 0, 1)"

    - system_id: "apply_fiber_cut"
      triggered_by: ["fiber_cut"]
      kind: "per_entity"
      entity_type: "network_hub"
      where: "NetworkNode.ward == event.ward"
      writes:
        - target: "NetworkNode.reliability"
          expr: "clamp(NetworkNode.reliability - event.severity, 0.10, 0.99)"
        - target: "NetworkNode.repair_backlog"
          expr: "clamp(NetworkNode.repair_backlog + event.severity * 20, 0, 80)"
        - target: "NetworkNode.outage_pressure"
          expr: "clamp(NetworkNode.outage_pressure + event.severity, 0, 1)"

    - system_id: "apply_repair_drive"
      triggered_by: ["repair_drive"]
      kind: "per_entity"
      entity_type: "network_hub"
      where: "NetworkNode.ward == event.ward"
      writes:
        - target: "NetworkNode.reliability"
          expr: "clamp(NetworkNode.reliability + event.boost, 0.10, 0.99)"
        - target: "NetworkNode.repair_backlog"
          expr: "max(0, NetworkNode.repair_backlog - event.boost * 35)"
        - target: "NetworkNode.outage_pressure"
          expr: "clamp(NetworkNode.outage_pressure - event.boost, 0, 1)"

    - system_id: "apply_training_day"
      triggered_by: ["training_day"]
      kind: "per_entity"
      entity_type: "resident"
      writes:
        - target: "PersonProfile.digital_skill"
          expr: 'clamp(PersonProfile.digital_skill + event.skill_boost * (0.6 + rng("training_attendance", 0, 0.6)), 0, 1)'
        - target: "InternetBehavior.trusted_info"
          expr: "clamp(InternetBehavior.trusted_info + event.trust_boost, 0, 1)"
        - target: "EventMemory.rumor_belief"
          expr: "clamp(EventMemory.rumor_belief - event.trust_boost * 0.4, 0, 1)"
        - target: "Adoption.interest"
          expr: "clamp(Adoption.interest + event.skill_boost * 0.5, 0, 1)"

    - system_id: "apply_subsidy_offer"
      triggered_by: ["subsidy_offer"]
      kind: "per_entity"
      entity_type: "resident"
      where: "PersonProfile.income < event.income_ceiling"
      writes:
        - target: "AccessState.monthly_cost"
          expr: "max(5, AccessState.monthly_cost - event.cost_discount)"
        - target: "Adoption.interest"
          expr: "clamp(Adoption.interest + event.interest_boost, 0, 1)"
        - target: "Adoption.subscribed"
          expr: "Adoption.subscribed || Adoption.interest > 0.48"
        - target: "AccessState.has_internet"
          expr: "Adoption.subscribed"

    - system_id: "apply_school_device_rollout"
      triggered_by: ["school_device_rollout"]
      kind: "per_entity"
      entity_type: "resident"
      where: 'PersonProfile.role == "student" || PersonProfile.role == "teacher"'
      writes:
        - target: "AccessState.device_quality"
          expr: "clamp(AccessState.device_quality + event.device_boost, 0, 1)"
        - target: "Adoption.interest"
          expr: "clamp(Adoption.interest + event.trust_boost, 0, 1)"
        - target: "InternetBehavior.trusted_info"
          expr: "clamp(InternetBehavior.trusted_info + event.trust_boost, 0, 1)"

    - system_id: "rumor_wave_social_spread"
      triggered_by: ["rumor_wave"]
      kind: "per_relation"
      relation_type: "friendship"
      writes:
        - target: "other.EventMemory.rumor_belief"
          expr: "clamp(other.EventMemory.rumor_belief + event.intensity * relation.tie_strength * max(0.1, 1 - other.InternetBehavior.trusted_info) + InternetBehavior.misinformation_exposure * 0.05, 0, 1)"
        - target: "other.InternetBehavior.misinformation_exposure"
          expr: "clamp(other.InternetBehavior.misinformation_exposure + event.intensity * relation.tie_strength * 0.20, 0, 1)"
        - target: "other.Adoption.churn_risk"
          expr: "clamp(other.Adoption.churn_risk + event.intensity * relation.tie_strength * 0.035, 0, 1)"

    - system_id: "festival_stream_spike"
      triggered_by: ["festival_stream"]
      kind: "per_entity"
      entity_type: "resident"
      writes:
        - target: "InternetBehavior.usage_hours"
          expr: "clamp(InternetBehavior.usage_hours + event.demand_boost * AccessState.has_internet * (0.5 + PersonProfile.digital_skill), 0, 12)"
        - target: "InternetBehavior.social_posts"
          expr: "clamp(InternetBehavior.social_posts + event.post_boost * AccessState.has_internet * (0.2 + PersonProfile.digital_skill), 0, 20)"
        - target: "InternetBehavior.misinformation_exposure"
          expr: "clamp(InternetBehavior.misinformation_exposure + event.post_boost * 0.02 * AccessState.has_internet, 0, 1)"
