scenario_id: "v2_invalid_agent_layer_reference"
schema_version: "2.0.0"
master_seed: 606

goal_statement: |
  Invalid v2 fixture used to verify that agent-layer reference validation rejects
  missing locations before runtime.

assumptions:
  - assumption_id: "v2_invalid_assume_001"
    category: "fixture"
    description: "The shop intentionally references a location that does not exist."
    rationale: "Validation should catch broken agent-layer references early."
    confidence_level: REJECT

entities:
  - entity_id: "v2_invalid_entity"
    entity_type: "fixture_anchor"
    description: "Compatibility anchor for v1 validation gates."
    attributes:
      fixture: "v2_invalid_agent_layer_reference"

variables:
  - variable_id: "v2_invalid_anchor"
    entity_ref: "v2_invalid_entity"
    type: FLOAT
    default_value: 1.0
    min_value: 0
    description: "Compatibility anchor variable."
  - variable_id: "v2_invalid_guard"
    entity_ref: "v2_invalid_entity"
    type: FLOAT
    default_value: 1.0
    min_value: 0
    description: "Compatibility guard variable."

dependency_edges:
  - edge_id: "v2_invalid_anchor_guard"
    source_variable: "v2_invalid_anchor"
    target_variable: "v2_invalid_guard"
    propagation_function_id: "linear_scale"
    weight: 1.0

constraints:
  - constraint_id: "v2_invalid_guard_non_negative"
    affected_variables: ["v2_invalid_guard"]
    constraint_expression: "v2_invalid_guard >= 0"
    enforcement_level: REJECT
    error_message: "v2_invalid_guard must remain non-negative."

events: []

evaluation_criteria:
  - criterion_id: "v2_invalid_eval"
    metric_name: "compatibility_guard"
    aggregation_method: FINAL
    input_variables: ["v2_invalid_guard"]
    threshold_min: 0
    description: "Compatibility check for the v1 validation path."

agent_layer:
  world:
    duration: 5.0
    time_unit: "minutes"
    map_width: 5.0
    map_height: 5.0
    default_walking_speed: 1.0
    max_event_count: 50

  locations:
    - location_id: "valid_start"
      location_type: "start"
      x: 0.0
      y: 0.0

  items:
    - item_id: "valid_item"
      category: "test"
      tags: ["test"]
      base_appeal: 1.0

  shops:
    - shop_id: "broken_shop"
      location_ref: "missing_shop_location"
      service_time: 0.1
      queue_capacity: 1
      inventory:
        - item_id: "valid_item"
          price: 1.0
          stock: 1

  agents:
    - agent_id: "valid_agent"
      start_location_ref: "valid_start"
      budget: 2.0
      movement_speed: 1.0
      hunger: 1.0
      social_susceptibility: 0.0
      memory_slots: 1
      policy_ref: "valid_policy"
      traits:
        patience: 1.0
      preferences:
        valid_item: 1.0

  policies:
    - policy_id: "valid_policy"
      movement_policy: "default"
      observation_policy: "default"
      conversation_policy: "default"
      purchase_policy: "weighted_rule_v2"
