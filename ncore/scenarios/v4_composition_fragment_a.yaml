scenario_id: "v4_composition_fragment_a"
schema_version: "1.0.0"
master_seed: 1
goal_statement: "v4 composition fragment A: seeded branching node."
assumptions:
  - assumption_id: "assume_v4_composition_fragment_a"
    category: "test"
    description: "Fragment A contributes a Branch component and a deterministic rng-based write."
    rationale: "Exercises namespacing rewrite across component/entity/event/system ids."
    confidence_level: REJECT

typed_layer:
  world:
    duration: 1.0
    time_unit: "ticks"
    max_event_count: 10

  component_types:
    - component_type_id: "Branch"
      fields:
        flag: BOOLEAN

  entity_types:
    - entity_type_id: "node"
      components: ["Branch"]

  event_types:
    - event_type_id: "start"
      payload_fields: {}

  entities:
    - entity_id: "n1"
      entity_type: "node"
      components:
        Branch:
          flag: false

  initial_events:
    - event_type: "start"
      timestamp: 0.0
      priority: 0
      event_handle: "frag_a_start_0000"

  systems:
    - system_id: "branch_once"
      triggered_by: ["start"]
      kind: "per_entity"
      entity_type: "node"
      writes:
        - target: "Branch.flag"
          expr: "rng(\"branch\", 0, 1) > 0.5"

