scenario_id: "market_butterfly_v2"
schema_version: "2.0.0"
master_seed: 20260504

goal_statement: |
  Simulate a small real-world market where person-to-person observations and
  seeded randomness produce deterministic but divergent causal purchase chains.

assumptions:
  - assumption_id: "v2_assume_001"
    category: "scope"
    description: "The market is modeled as a fixed 2D map for this run."
    rationale: "NoisiaX v2 focuses on deterministic local market behavior."
    confidence_level: REJECT
  - assumption_id: "v2_assume_002"
    category: "behavior"
    description: "Agents use rule-based deterministic decisions with seeded jitter."
    rationale: "Keeps replayability while allowing butterfly effects."
    confidence_level: REJECT

entities:
  - entity_id: "market_v2_entity"
    entity_type: "market"
    description: "Anchor entity for core v1 compatibility fields"
    attributes:
      district: "old_town"
      market_type: "street_food"

variables:
  - variable_id: "sim_anchor"
    entity_ref: "market_v2_entity"
    type: FLOAT
    default_value: 1.0
    min_value: 0
    description: "Compatibility anchor variable"
  - variable_id: "sim_guard"
    entity_ref: "market_v2_entity"
    type: FLOAT
    default_value: 1.0
    min_value: 0
    description: "Compatibility guard variable"

dependency_edges:
  - edge_id: "anchor_guard_edge"
    source_variable: "sim_anchor"
    target_variable: "sim_guard"
    propagation_function_id: "linear_scale"
    weight: 1.0

constraints:
  - constraint_id: "guard_non_negative"
    affected_variables: ["sim_guard"]
    constraint_expression: "sim_guard >= 0"
    enforcement_level: REJECT
    error_message: "sim_guard must remain non-negative"

events: []

evaluation_criteria:
  - criterion_id: "compat_eval_001"
    metric_name: "compatibility_guard"
    aggregation_method: FINAL
    input_variables: ["sim_guard"]
    threshold_min: 0
    description: "Compatibility check for v1 validation gates"

