scenario_id: "v2_max_events_limit"
schema_version: "2.0.0"
master_seed: 505

goal_statement: |
  Verify that a valid v2 agent layer can halt cleanly when repeated retry
  decisions exceed the configured max event limit.

assumptions:
  - assumption_id: "v2_max_events_assume_001"
    category: "fixture"
    description: "A buyer with no affordable in-stock option will retry until the event limit stops it."
    rationale: "The v2 runtime needs a bounded failure mode for runaway event generation."
    confidence_level: REJECT

entities:
  - entity_id: "v2_max_events_entity"
    entity_type: "fixture_anchor"
    description: "Compatibility anchor for v1 validation gates."
    attributes:
      fixture: "v2_max_events_limit"

variables:
  - variable_id: "v2_max_events_anchor"
    entity_ref: "v2_max_events_entity"
    type: FLOAT
    default_value: 1.0
    min_value: 0
    description: "Compatibility anchor variable."
  - variable_id: "v2_max_events_guard"
    entity_ref: "v2_max_events_entity"
    type: FLOAT
    default_value: 1.0
    min_value: 0
    description: "Compatibility guard variable."

dependency_edges:
  - edge_id: "v2_max_events_anchor_guard"
    source_variable: "v2_max_events_anchor"
    target_variable: "v2_max_events_guard"
    propagation_function_id: "linear_scale"
    weight: 1.0

constraints:
  - constraint_id: "v2_max_events_guard_non_negative"
    affected_variables: ["v2_max_events_guard"]
    constraint_expression: "v2_max_events_guard >= 0"
    enforcement_level: REJECT
    error_message: "v2_max_events_guard must remain non-negative."

events: []

evaluation_criteria:
  - criterion_id: "v2_max_events_eval"
    metric_name: "compatibility_guard"
    aggregation_method: FINAL
    input_variables: ["v2_max_events_guard"]
    threshold_min: 0
    description: "Compatibility check for the v1 validation path."

agent_layer:
  world:
    duration: 30.0
    time_unit: "minutes"
    map_width: 5.0
    map_height: 5.0
    default_walking_speed: 1.0
    max_event_count: 6

  locations:
    - location_id: "empty_counter"
      location_type: "shop"
      x: 1.0
      y: 1.0

  items:
    - item_id: "unreachable_item"
      category: "test"
      tags: ["test"]
      base_appeal: 1.0

  shops:
    - shop_id: "empty_stall"
      location_ref: "empty_counter"
      service_time: 0.1
      queue_capacity: 1
      inventory:
        - item_id: "unreachable_item"
          price: 5.0
          stock: 0

  agents:
    - agent_id: "retrying_agent"
      start_location_ref: "empty_counter"
      budget: 1.0
      movement_speed: 1.0
      hunger: 1.0
      social_susceptibility: 0.0
      memory_slots: 1
      policy_ref: "retry_policy"
      traits:
        patience: 0.1
      preferences:
        unreachable_item: 2.0

  policies:
    - policy_id: "retry_policy"
      movement_policy: "same_location"
      observation_policy: "none"
      conversation_policy: "none"
      purchase_policy: "weighted_rule_v2"
