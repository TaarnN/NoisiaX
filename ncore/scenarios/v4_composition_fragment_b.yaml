scenario_id: "v4_composition_fragment_b"
schema_version: "1.0.0"
master_seed: 1
goal_statement: "v4 composition fragment B: simple counter increment."
assumptions:
  - assumption_id: "assume_v4_composition_fragment_b"
    category: "test"
    description: "Fragment B contributes a Counter component and a deterministic write."
    rationale: "Exercises namespacing rewrite across component/entity/event/system ids."
    confidence_level: REJECT

typed_layer:
  world:
    duration: 1.0
    time_unit: "ticks"
    max_event_count: 10

  component_types:
    - component_type_id: "Counter"
      fields:
        value: INTEGER

  entity_types:
    - entity_type_id: "node"
      components: ["Counter"]

  event_types:
    - event_type_id: "start"
      payload_fields: {}

  entities:
    - entity_id: "n2"
      entity_type: "node"
      components:
        Counter:
          value: 0

  initial_events:
    - event_type: "start"
      timestamp: 0.0
      priority: 0
      event_handle: "frag_b_start_0000"

  systems:
    - system_id: "increment_once"
      triggered_by: ["start"]
      kind: "per_entity"
      entity_type: "node"
      writes:
        - target: "Counter.value"
          expr: "Counter.value + 1"

